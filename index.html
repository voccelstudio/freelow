<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelow</title>
<link rel="stylesheet" href="app.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Syne:wght@400;600;700;800&family=Unbounded:wght@400;700&family=Inconsolata:wght@400;500;600&family=Space+Mono:wght@400;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
</head>
<body data-theme="minimal">

<!-- ─── ONBOARDING (oculto por defecto) ─── -->
<div id="onboarding" style="display:none">
  <div class="ob-wrap">
    <div class="ob-card" id="ob-card">
      <div id="ob-panel"></div>
    </div>
  </div>
</div>

<!-- ─── APP SHELL ─── -->
<div id="app" class="app" style="display:none">
  <aside class="sb">
    <div class="sb-logo" onclick="nav('dashboard')">
      <div class="logo-m">FL</div>
      <div>
        <div class="logo-t">Freelow</div>
        <div class="logo-s">Control de vuelo</div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav">
      <div class="nav-sec">Principal</div>
      <div class="nav-it" data-page="dashboard" onclick="nav('dashboard')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        Dashboard
        <span class="n-badge" id="nb" style="display:none">0</span>
      </div>
      <div class="nav-it" data-page="proyectos" onclick="nav('proyectos')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="12" height="9" rx="2"/><path d="M5 5V3a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        Proyectos
      </div>
      <div class="nav-it" data-page="clientes" onclick="nav('clientes')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="3"/><path d="M1 14c0-3 2.5-5 5-5s5 2 5 5"/><circle cx="12" cy="5" r="2"/><path d="M12 10c1.5 0 3 1 3 4"/></svg>
        Clientes
      </div>
      <div class="nav-it" data-page="finanzas" onclick="nav('finanzas')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1v2M8 13v2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M1 8h2M13 8h2M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/><circle cx="8" cy="8" r="3"/></svg>
        Finanzas
      </div>
      <div class="nav-sec">Gestión</div>
      <div class="nav-it" data-page="comunicaciones" onclick="nav('comunicaciones')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2h12a1 1 0 011 1v7a1 1 0 01-1 1H5l-3 3V3a1 1 0 011-1z"/></svg>
        Comunicaciones
      </div>
      <div class="nav-it" data-page="calendario" onclick="nav('calendario')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="12" rx="2"/><path d="M1 7h14M5 1v4M11 1v4"/></svg>
        Calendario
      </div>
      <div class="nav-it" data-page="notificaciones" onclick="nav('notificaciones')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1a5 5 0 015 5v3l1.5 2.5H1.5L3 9V6a5 5 0 015-5zM6.5 13.5a1.5 1.5 0 003 0"/></svg>
        Alertas
      </div>
      <div class="nav-sec">Reportes</div>
      <div class="nav-it" data-page="analisis" onclick="nav('analisis')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 14l4-4 3 2 4-6 3 3"/></svg>
        Análisis
      </div>
      <div class="nav-it" data-page="reporte" onclick="nav('reporte')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h8M4 7h8M4 10h5"/><rect x="1" y="1" width="14" height="14" rx="2"/></svg>
        Reporte
      </div>
      <div class="nav-sec">Sistema</div>
      <div class="nav-it" data-page="configuracion" onclick="nav('configuracion')">
        <svg class="ni" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M1 8h2M13 8h2M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/></svg>
        Configuración
      </div>
    </nav>
    <div class="sb-themes">
      <div class="th-label">Tema</div>
      <div class="th-grid" id="th-grid"></div>
    </div>
  </aside>
  <div class="main">
    <div id="page-root"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
